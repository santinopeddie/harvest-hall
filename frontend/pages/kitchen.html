<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Dashboard – Harvest Hall</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .refresh-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .status-select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .no-orders {
      text-align: center; padding: 48px 0;
      color: var(--grey-mid); font-size: 1rem;
    }
    .auto-refresh-label { font-size: 0.82rem; color: var(--grey-mid); }
  </style>
</head>
<body>

<header class="navbar">
  <span class="brand">🌾 Harvest Hall — Kitchen</span>
  <nav>
    <a href="../index.html">Back to Menu</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<div class="container">
  <div class="refresh-bar">
    <h2 class="section-title" style="margin:0">Active Orders</h2>
    <div>
      <span class="auto-refresh-label" id="refresh-label">Auto-refreshing every 30s</span>
      <button class="btn btn-secondary" style="margin-left:10px" onclick="loadOrders()">
        🔄 Refresh Now
      </button>
    </div>
  </div>

  <div id="loading" class="spinner"></div>
  <div id="kitchen-grid" class="kitchen-grid" style="display:none;"></div>
  <div id="no-orders" class="no-orders" style="display:none;">
    ✅ No active orders right now. All caught up!
  </div>
</div>

<div id="toast"></div>
<script src="../js/api.js"></script>
<script>
// ============================================================
// Story 4: Kitchen staff order view (Release 2)
// ============================================================

let refreshTimer;

document.addEventListener('DOMContentLoaded', () => {
  loadOrders();
  refreshTimer = setInterval(loadOrders, 30000); // auto-refresh every 30s
});

async function loadOrders() {
  const grid    = document.getElementById('kitchen-grid');
  const loading = document.getElementById('loading');
  const noOrders = document.getElementById('no-orders');

  loading.style.display = 'block';
  grid.style.display    = 'none';
  noOrders.style.display = 'none';

  try {
    const orders = await apiGet('/orders/active');
    loading.style.display = 'none';

    if (!orders.length) {
      noOrders.style.display = 'block';
      return;
    }

    grid.style.display = 'grid';
    grid.innerHTML = orders.map(order => renderKitchenCard(order)).join('');
  } catch (err) {
    loading.style.display = 'none';
    showToast('Error loading orders: ' + err.message);
  }
}

function renderKitchenCard(order) {
  const itemsList = (order.orderItems || [])
    .map(i => `<div style="font-size:0.88rem; padding:2px 0;">${i.menuItem.name} × ${i.quantity}</div>`)
    .join('');

  const statusOptions = ['PENDING','CONFIRMED','PREPARING','COMPLETED']
    .map(s => `<option value="${s}" ${order.status === s ? 'selected' : ''}>${s}</option>`)
    .join('');

  return `
    <div class="kitchen-card status-${order.status}" id="card-${order.id}">
      <div class="flex-between">
        <span class="order-num">Order #${order.id}</span>
        <span class="badge badge-${order.status}">${order.status}</span>
      </div>
      <div class="order-meta">
        👤 ${order.customerName}<br>
        🕐 ${formatDateTime(order.orderTime)}
        ${order.pickupTime ? '<br>📦 Pickup: ' + formatDateTime(order.pickupTime) : ''}
      </div>
      <div style="margin-bottom:10px;">${itemsList}</div>
      ${order.specialInstructions
        ? `<div style="font-size:0.82rem; color:var(--amber); margin-bottom:8px;">
             ⚠️ ${order.specialInstructions}</div>` : ''}
      <div style="display:flex; gap:8px; align-items:center;">
        <select class="status-select" id="status-${order.id}">${statusOptions}</select>
        <button class="btn btn-primary" style="padding:6px 14px; font-size:0.85rem;"
                onclick="updateStatus(${order.id})">Update</button>
      </div>
    </div>
  `;
}

async function updateStatus(orderId) {
  const select = document.getElementById('status-' + orderId);
  const newStatus = select.value;
  try {
    await apiPatch(`/orders/${orderId}/status?status=${newStatus}`);
    showToast(`Order #${orderId} updated to ${newStatus}`);
    await loadOrders();
  } catch (err) {
    showToast('Update failed: ' + err.message);
  }
}
</script>

</body>
</html>
