# ============================================================
# Harvest Hall Online Food Ordering System – Spring Boot Config
# ============================================================

spring.application.name=harvest-hall

# ---- DataSource (MySQL) ----
spring.datasource.url=jdbc:mysql://localhost:3306/harvest_hall_db?useSSL=false&serverTimezone=America/Winnipeg&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Server ----
server.port=8080

# ---- Logging ----
logging.level.com.harvesthall=DEBUG
logging.level.org.springframework.web=INFO

# ---- JSON formatting ----
spring.jackson.serialization.indent_output=true
spring.jackson.serialization.write-dates-as-timestamps=false
